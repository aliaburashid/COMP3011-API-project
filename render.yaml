# Render Blueprint — FlickGallery deployment
# Deploy: https://dashboard.render.com/select-repo?type=blueprint

services:
  - type: web
    name: flickgallery
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false  # Set in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Auto-generate; or set manually
      - key: PORT
        value: 3000
